<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Simple2</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    button { margin: 8px 0; padding: 8px 12px; }
    .msg { margin-top: 10px; font-weight: bold; }
    .error { color: #cc0000; }
  </style>
</head>
<body>
  <h1>Simple2</h1>

  <button id="check">Prüfen</button>

  <div id="msg" class="msg">Start...</div>

  <script>
    const msgEl = document.getElementById("msg");
    const checkBtn = document.getElementById("check");

    checkBtn.addEventListener("click", () => {
      msgEl.textContent = "window.supabase? " + (window.supabase ? "ja" : "nein");

      if (!window.supabase) {
        msgEl.className = "msg error";
        msgEl.textContent += "\nSupabase-js nicht geladen.";
        return;
      }

      msgEl.textContent += "\nSupabase ist vorhanden.";
      msgEl.textContent += "\ncreateClient? " + (window.supabase.createClient ? "ja" : "nein");
    });
  </script>
</body>
</html>
